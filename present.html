<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODIFY — Сканируй и проходи опрос</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --purple: #6C3CE1;
      --purple-d: #4C1D95;
      --amber: #F59E0B;
      --ink: #1E1B4B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      color: #fff;
      background: linear-gradient(145deg, #4C1D95, #6C3CE1 60%, #8B5CF6);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .brand {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      opacity: 0.9;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.12);
      padding: 6px 28px;
      border-radius: 60px;
    }
    h1 {
      font-size: clamp(30px, 5vw, 52px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .sub {
      font-size: clamp(17px, 2.5vw, 24px);
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 36px;
    }
    .qr-box {
      background: #fff;
      border-radius: 36px;
      padding: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      transition: transform 0.2s;
    }
    .qr-box:hover { transform: scale(1.01); }
    #qr img, #qr canvas {
      display: block;
      width: clamp(220px, 38vw, 340px) !important;
      height: clamp(220px, 38vw, 340px) !important;
      border-radius: 12px;
    }
    .steps {
      display: flex;
      gap: 24px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(15px, 1.8vw, 20px);
      font-weight: 800;
      background: rgba(255,255,255,0.10);
      padding: 10px 22px 10px 14px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }
    .num {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--amber);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 20px;
      flex-shrink: 0;
    }
    .url-box {
      margin-top: 34px;
      font-size: clamp(15px, 1.8vw, 20px);
      font-weight: 800;
      background: rgba(255,255,255,0.13);
      padding: 16px 30px;
      border-radius: 100px;
      border: 2px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
      max-width: 92%;
      word-break: break-all;
    }
    .url-link {
      display: block;
      margin-top: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #4C1D95;
      text-decoration: underline;
      word-break: break-all;
    }
    .host-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .host-input {
      flex: 1 1 220px;
      min-width: 220px;
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.95);
      color: #111827;
      outline: none;
    }
    .host-btn {
      flex: 0 0 auto;
      padding: 12px 18px;
      border-radius: 14px;
      border: none;
      background: #6C3CE1;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .host-btn:hover {
      transform: translateY(-1px);
    }
    .warn {
      margin-top: 20px;
      font-size: 15px;
      font-weight: 700;
      opacity: 0.75;
      max-width: 560px;
      background: rgba(255,215,0,0.15);
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid rgba(255,215,0,0.3);
    }
    .footnote {
      margin-top: 36px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.5;
    }
    @media (max-width: 600px) {
      .steps { flex-direction: column; align-items: center; gap: 12px; }
      .step { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="brand">✦ CODIFY</div>
  <h1>Сканируй и проходи опрос</h1>
  <p class="sub">Наведи камеру телефона на QR-код</p>

  <div class="qr-box">
    <div id="qr"></div>
  </div>

  <div class="steps">
    <div class="step"><span class="num">1</span> Открой камеру</div>
    <div class="step"><span class="num">2</span> Наведи на QR</div>
    <div class="step"><span class="num">3</span> Перейди по ссылке</div>
  </div>

  <div class="url-box">
    <div id="urlText"></div>
    <a id="urlLink" class="url-link" target="_blank" rel="noreferrer noopener"></a>
  </div>
  <div class="host-row">
    <input id="hostInput" class="host-input" type="text" placeholder="Введите адрес сервера, например http://192.168.1.12:8000">
    <button id="applyHost" class="host-btn">Применить</button>
  </div>
  <div class="warn" id="warn"></div>
  <div class="footnote">CODIFY · Система сбора NPS</div>

<script>
  // ================================================================
  //  QR-код ведёт на админ-панель через серверную ссылку.
  //  Используем origin, но при загрузке файла есть fallback на локальный сервер.
  // ================================================================
  const DEFAULT_HOST = 'http://10.10.10.138:8000';
  const HTTP_SCHEME = window.location.protocol === 'https:' ? 'https:' : 'http:';
  const COMMON_PORTS = ['8000', '5500', '8080', '3000', '5000', '4200'];
  let manualHost = null;

  function getExplicitHost() {
    if (manualHost) return manualHost;
    const params = new URLSearchParams(window.location.search);
    const explicitHost = params.get('host');
    if (!explicitHost) return null;
    const host = explicitHost.trim();
    if (/^https?:\/\//.test(host)) return host.replace(/\/+$/, '');
    if (/^[\w.\-]+(:\d+)?$/.test(host)) return HTTP_SCHEME + '//' + host;
    return null;
  }

  function isPrivateIPv4(ip) {
    return /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(ip);
  }

  function getLocalIPs() {
    return new Promise((resolve) => {
      const ips = new Set();
      const pc = new RTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('');
      pc.createOffer().then((offer) => pc.setLocalDescription(offer)).catch(() => {
        pc.close();
        resolve([]);
      });
      pc.onicecandidate = (event) => {
        if (!event.candidate) {
          pc.close();
          resolve([...ips]);
          return;
        }
        const cand = event.candidate.candidate;
        const matches = cand.match(/([0-9]{1,3}(?:\.[0-9]{1,3}){3})/g);
        if (matches) {
          matches.forEach((ip) => {
            if (isPrivateIPv4(ip)) ips.add(ip);
          });
        }
      };
      setTimeout(() => {
        pc.close();
        resolve([...ips]);
      }, 1800);
    });
  }

  async function probeHost(baseUrl) {
    try {
      await fetch(baseUrl + '/admin.html', { method: 'HEAD', mode: 'no-cors', cache: 'no-store' });
      return true;
    } catch (error) {
      return false;
    }
  }

  async function findActiveHost(ipList, portHint) {
    const ports = [portHint, ...COMMON_PORTS.filter((p) => p !== portHint)];
    for (const ip of ipList) {
      for (const port of ports) {
        const candidate = `${HTTP_SCHEME}//${ip}:${port}`;
        if (await probeHost(candidate)) return candidate;
      }
    }
    return null;
  }

  async function resolveServerBase() {
    const explicit = getExplicitHost();
    if (explicit) return explicit;
    const origin = window.location.origin;
    const port = origin && origin !== 'null' && origin !== 'file://' && origin !== 'about:blank'
      ? new URL(origin).port || '8000'
      : '8000';

    const localIPs = await getLocalIPs();
    if (origin && origin !== 'null' && origin !== 'file://' && origin !== 'about:blank') {
      if (!/^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/.test(origin)) {
        if (await probeHost(origin.replace(/\/+$/, ''))) return origin.replace(/\/+$/, '');
        return null;
      }
      const activeHost = await findActiveHost(localIPs, port);
      if (activeHost) return activeHost;
      if (localIPs.length) return HTTP_SCHEME + '//' + localIPs[0] + ':' + port;
    }

    if (localIPs.length) {
      const activeHost = await findActiveHost(localIPs, port);
      if (activeHost) return activeHost;
      return HTTP_SCHEME + '//' + localIPs[0] + ':' + port;
    }
    return null;
  }

  async function initQR() {
    const serverBase = await resolveServerBase();
    const surveyUrl = (serverBase || DEFAULT_HOST) + '/admin.html';
    document.getElementById('urlText').textContent = surveyUrl;
    const urlLink = document.getElementById('urlLink');
    urlLink.href = surveyUrl;
    urlLink.textContent = surveyUrl;
    new QRCode(document.getElementById('qr'), {
      text: surveyUrl,
      width: 340,
      height: 340,
      colorDark: '#1E1B4B',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
    const hostInput = document.getElementById('hostInput');
    const applyBtn = document.getElementById('applyHost');
    if (hostInput && applyBtn) {
      if (!manualHost) {
        const explicit = getExplicitHost();
        hostInput.value = explicit || ''; }
      applyBtn.onclick = async () => {
        const value = hostInput.value.trim();
        if (!value) return;
        manualHost = value.replace(/\/+$/, '');
        if (!/^https?:\/\//.test(manualHost)) {
          manualHost = HTTP_SCHEME + '//' + manualHost;
        }
        await initQR();
      };
    }
    if (serverBase) {
      document.getElementById('warn').textContent = '✅ QR-код ведёт на админ-панель через ' + serverBase + '/admin.html';
    } else {
      document.getElementById('warn').textContent = '⚠️ Сервер не найден автоматически. Проверьте, что на ПК запущен HTTP-сервер и введите host в URL, например ?host=http://192.168.x.x:8000.';
    }
  }

  // ----------------------------------------------------------------
  // отображение ссылки и генерация QR
  // ----------------------------------------------------------------
  initQR();
</script>

</body>
</html>
